name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  moonbit:
    name: Build and Test (MoonBit)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup MoonBit
        uses: cogna-dev/moonbit-actions/setup@v0

      - name: Check
        run: moon check --manifest-path moon.work.json

      - name: Build
        run: moon build --manifest-path moon.work.json

      - name: Test
        run: moon test --manifest-path moon.work.json

  rust-reference:
    name: Rust nom reference tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test reference/nom-json
        run: cargo test --manifest-path reference/nom-json/Cargo.toml
